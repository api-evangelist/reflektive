apis:
  - aid: reflektive:reflektive-api
    name: Reflektive API
    description: >-
      The Reflektive REST API provides programmatic access to performance
      management data including real-time feedback, performance reviews, goal
      management, engagement surveys, and asynchronous report generation.
      Authentication uses a company-level token passed as an HTTP Authorization
      header. The API is versioned (v1 and v2), with v2 supporting multi-recipient
      team recognition in addition to the core v1 resource set.
