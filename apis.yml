aid: reflektive
name: Reflektive
description: >-
  Reflektive is a cloud-based performance management platform that enables
  organizations to scale constructive, ongoing conversations across their
  workforce. The platform provides a REST API for managing performance reviews,
  real-time feedback, goal tracking, and engagement survey data, allowing
  engineering teams to integrate Reflektive data into their own systems and
  workflows. The API supports GET, POST, PATCH, and DELETE operations against
  company data using token-based authentication, with versioned endpoints
  covering real-time feedback, tasks, reports, goals, and review cycles. Hosted
  API reference documentation is available via SwaggerHub and a dedicated
  developer portal, enabling developers to explore and test endpoints
  interactively. Reflektive is now part of PeopleFluent, a learning and talent
  management suite operating under the Learning Technologies Group.
